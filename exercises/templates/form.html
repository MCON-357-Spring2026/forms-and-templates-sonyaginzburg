{% extends "base.html" %}

{% block content %}
<form method="POST">
    <label>Username:</label>
    <input type="text" name="username">
    <button type="submit">Submit</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif  %}

{% if username %}
<div class="box">
    Welcome {{ username }}!
</div>
{% endif  %}

{% endblock %}
